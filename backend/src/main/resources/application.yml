spring:
  application:
    name: smart-campus-backend
  config:
    import: optional:file:.env[.properties]
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/smartcampus_db}

google:
  auth:
    client-id: ${GOOGLE_AUTH_CLIENT_ID:384649476958-c6b17p693e4kt4spnovf3qnm8danqlt0.apps.googleusercontent.com}

app:
  jwt:
    secret: ${JWT_SECRET:smart-campus-dev-secret-key-smart-campus-dev-secret-key}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

server:
  port: ${PORT:8080}
